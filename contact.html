<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | TechNext - お問い合わせ</title>
    <meta
      name="description"
      content="Web制作やシステム開発のご相談、お見積り依頼など、お気軽にお問い合わせください。専門のスタッフが丁寧に対応いたします。"
    />
    <meta property="og:title" content="TechNext | Web制作会社" />
    <meta
      property="og:description"
      content="デザインと技術で未来を書き換えるWeb制作会社TechNextの公式サイトです。"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://example.com/" />
    <meta property="og:image" content="https://example.com/images/ogp.jpg" />

    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%%22 y=%2250%%22 style=%22dominant-baseline:central;text-anchor:middle;font-size:90px;%22>⌨️</text></svg>"
    />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/contact.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <h1 class="logo"><a href="index.html">TechNext</a></h1>
        <nav class="nav">
          <ul class="nav-list">
            <li><a href="index.html">Home</a></li>
            <li><a href="service.html">Service</a></li>
            <li><a href="works.html">Works</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section class="lower-page-header">
        <div class="container">
          <h1>Contact</h1>
          <p class="section-text">
            <span>制作のご依頼、</span><span>お見積りのご相談など、</span><br />
            <span>まずはお気軽に</span><span>お問い合わせください。</span>
          </p>
        </div>
      </section>

      <section class="contact-container container">
        <div class="contact-card">
          <form class="contact-form">
            <div class="form-group">
              <label for="name">お名前<span>必須</span></label>
              <input
                type="text"
                id="name"
                name="name"
                placeholder="山田 太郎"
                required
              />
            </div>
            <div class="form-group">
              <label for="email">メールアドレス<span>必須</span></label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="tech-next@example.com"
                required
              />
            </div>
            <div class="form-group">
              <label for="type">お問い合わせ種別</label>
              <select id="type" name="type">
                <option value="">選択してください</option>
                <option value="site">Webサイト制作について</option>
                <option value="system">システム開発について</option>
                <option value="other">その他</option>
              </select>
            </div>
            <div class="form-group">
              <label for="message">お問い合わせ内容</label>
              <textarea
                id="message"
                name="message"
                rows="8"
                placeholder="ご相談内容をご記入ください"
              ></textarea>
            </div>
            <div class="form-submit">
              <button type="submit" class="btn">上記の内容で送信する</button>
            </div>
          </form>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container footer-inner">
        <div class="footer-info">
          <h2 class="logo-footer">TechNext</h2>
          <p>デザインと技術で未来を書き換える。</p>
        </div>
        <nav class="footer-nav">
          <ul class="footer-nav-list">
            <li><a href="index.html">Home</a></li>
            <li><a href="service.html">Service</a></li>
            <li><a href="works.html">Works</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
          </ul>
        </nav>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 TechNext Inc. All rights reserved.</p>
      </div>
    </footer>
  </body>
</html>
